menu_name: '<dark_gray>Item Shop - {view}'
menu_size: 54
type: "CHEST"

# Slots used by the active tab content area.
# Category tabs use these slots automatically when content entries do not define a slot.
# Quick Buy inherits these slots unless templates.quick_buy.dynamic_slots is configured.
dynamic_slots:
  - 19
  - 20
  - 21
  - 22
  - 23
  - 24
  - 25
  - 28
  - 29
  - 30
  - 31
  - 32
  - 33
  - 34
  - 37
  - 38
  - 39
  - 40
  - 41
  - 42
  - 43

# ============================================
# ITEM SHOP CONFIGURATION
# ============================================
# Currency colors in the shop:
#   iron     -> white
#   gold     -> gold/orange
#   diamond  -> aqua/cyan
#   emerald  -> dark_green
#
# QUICK BUY:
# - Players can SHIFT+CLICK any item in a category to add it to Quick Buy
# - Players can SHIFT+CLICK an item in Quick Buy to remove it
# - Quick Buy uses dynamic_slots by default, or templates.quick_buy.dynamic_slots when set
# ============================================

templates:
  quick_buy:
    # Optional: add dynamic_slots here only if Quick Buy should use a different grid.
    view: "Quick Buy"
    tab_selected: "<yellow>Quick Buy</yellow>"
    tab: "<gray>Quick Buy</gray>"
    add_lore: "<dark_gray>Sneak Click to add to Quick Buy</dark_gray>"
    remove_lore: "<dark_gray>Sneak Click to remove from Quick Buy!</dark_gray>"
    empty:
      name: " "
      item_stack:
        material: "RED_STAINED_GLASS_PANE"
        amount: 1
      lore:
        - "<red>This is a Quick Buy Slot!</red>"
        - "<gray>Sneak Click any item in</gray>"
        - "<gray>the shop to add it here.</gray>"
  category:
    # Slots used by category tab items. Per-category slot overrides are optional.
    dynamic_slots:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
    tab_selected: "<yellow>{category}</yellow>"
    tab: "<gray>{category}</gray>"
  navigation:
    selected_lore: "<green>Selected</green>"
    click_to_view_lore: "<gray>Click to view</gray>"
    separator_regular:
      item_stack:
        material: "GRAY_STAINED_GLASS_PANE"
        amount: 1
    separator_selected:
      item_stack:
        material: "GREEN_STAINED_GLASS_PANE"
        amount: 1
  content:
    tier_line: "{color}Tier {tier} <gray>- {currency_color}{price} {currency}</gray>"
    cost_line: "<gray>Cost: {currency_color}{price} {currency}</gray>"
    maxed_line: "<aqua>MAXED OUT</aqua>"
    click_to_purchase_line: "<green>Click to purchase!</green>"
    not_enough_resources_line: "<red>Not enough resources!</red>"

items:
  quick_buy:
    slot: 0
    item_stack:
      material: "NETHER_STAR"
      amount: 1

shop:
  settings:
    # Highest numeric index scanned in categories, content, tiers, buy_items, effects and actions.
    # This allows admins to leave gaps in numbered sections without stopping the loader.
    max_index_scan: 256
    separator_slots: "9,10,11,12,13,14,15,16,17"

  # Optional custom right-click specials for buy_items with custom "special" ids.
  # Supported actions:
  #   message:<MiniMessage text>
  #   broadcast:<MiniMessage text>
  #   console:<command without slash>
  #   player:<command without slash>
  #   sound:<SOUND>[:volume[:pitch]]
  #   effect:<EFFECT>:<duration_ticks>:<amplifier>[:ambient[:particles]]
  #   give:<MATERIAL>[:amount]
  # Placeholders: {player}, {uuid}, {arena}, {arena_id}, {team}, {special}
  specials: {}

  # Categories, content, tiers and buy_items all support optional actions lists.
  # Purchase actions use the same syntax as specials, with extra placeholders:
  # {category}, {category_id}, {item}, {item_id}, {tier}, {price}, {currency}.
  # Example:
  # actions:
  #   1: "message:<green>You bought {item}.</green>"
  # Quick Buy defaults: items shown in Quick Buy by default.
  # Items are placed in dynamic_slots order unless an entry defines a slot override.
  # Format: category = category id, content = content id from that category.
