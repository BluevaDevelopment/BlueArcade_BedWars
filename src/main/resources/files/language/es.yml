        night: "Noche"
        sunset: "Atardecer"
        sunrise: "Amanecer"
      weather:
        sunny: "Soleado"
        rainy: "Lluvioso"
  messages:
    broadcast: "<yellow>{player}</yellow> <gray>eligió</gray> <aqua>{category}</aqua> <dark_gray>→</dark_gray> <white>{option}</white> <yellow>({votes} votos)</yellow>"
