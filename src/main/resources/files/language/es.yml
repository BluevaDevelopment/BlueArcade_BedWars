      sources:
        popular: "por votación popular"
        default: "por defecto"
      hearts: "<gray>Seleccionado</gray> <red>{option}</red> <gray>{source}.</gray>"
      time: "<gray>Seleccionado</gray> <yellow>{option}</yellow> <gray>hora {source}.</gray>"
      weather: "<gray>Seleccionado</gray> <blue>{option}</blue> <gray>clima {source}.</gray>"
    invalid: "<red>Esa opción de voto no está disponible.</red>"
    not_available: "<red>Solo puedes votar mientras esperas a que empiece la partida.</red>"
    no_permission: "<red>No tienes permiso para votar por</red> <yellow>{option}</yellow><red>.</red>"

