setup_messages:
  common:
    boolean_true: "Sí"
    boolean_false: 'No'
  team:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars team <count|size> <value></yellow>"
    success: "{prefix} <green>Equipo {setting} establecido en {value} para {game} en la arena {arena_id}.</green>"
    invalid_limit: "{prefix} <red>La configuración de equipos supera el máximo de jugadores de la arena ({max_players}).</red>"
    invalid_value: "{prefix} <red>Equipo {setting} debe ser mayor que 0.</red>"
    invalid_count: "{prefix} <red>El número de equipos debe ser al menos 2.</red>"
    invalid_size: "{prefix} <red>El tamaño del equipo debe ser al menos 1.</red>"
    numeric_ids_only: "{prefix} <red>team_id debe ser numérico y estar dentro del rango configurado: <white>{min}</white> a <white>{max}</white>.</red>"
  region:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars region <set|clear></yellow>"
    must_use_stick: "{prefix} <red>Selecciona primero dos esquinas con la herramienta de setup.</red>"
    set: "{prefix} <green>Región de regeneración guardada.</green> <gray>Bloques:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
    cleared: "{prefix} <yellow>Región de regeneración borrada.</yellow>"
  bed:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars bed set <team_id></yellow>"
    set_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars bed set <team_id></yellow>"
    must_look_at_block: "{prefix} <red>Mira el bloque de cama que quieres establecer como cama del equipo.</red>"
    set: "{prefix} <green>Cama establecida para el equipo <white>{team}</white> en el bloque seleccionado.</green>"
  spawner:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars spawner <add|list|remove></yellow>"
    add_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars spawner add <iron|gold|diamond|emerald> <true|false></yellow>"
    must_look_at_block: "{prefix} <red>Mira al bloque donde debe colocarse el generador.</red>"
    invalid_type: "{prefix} <red>Tipo de generador no válido: <white>{type}</white>. Usa: iron, gold, diamond, emerald.</red>"
    invalid_hologram: "{prefix} <red>No válido hologram value: <white>{value}</white>. Must be <white>true</white> or <white>false</white>.</red>"
    added: "{prefix} <green>Spawner <white>#{id}</white> añadido. Type: <white>{type}</white>, hologram: <white>{hologram}</white>. Interval is configurado en settings.yml.</green>"
    removed: "{prefix} <yellow>Spawner <white>#{id}</white> eliminado.</yellow>"
    not_found: "{prefix} <red>No se encontró ningún generador en el bloque seleccionado.</red>"
    list_header: "{prefix} <gold>Generadores configurados:</gold>"
    list_line: "{prefix} <gray>- <white>#{id}</white> | tipo: <white>{type}</white> | holograma: <white>{hologram}</white></gray>"
    list_empty: "{prefix} <yellow>Aún no hay generadores configurados.</yellow>"
  npc:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars npc <add|list|remove></yellow>"
    add_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars npc add <store|upgrade></yellow>"
    invalid_type: "{prefix} <red>Tipo de NPC no válido: <white>{type}</white>. Usa: store, upgrade.</red>"
    added: "{prefix} <green>NPC <white>#{id}</white> añadido. Type: <white>{type}</white>.</green>"
    removed: "{prefix} <yellow>NPC <white>#{id}</white> eliminado.</yellow>"
    not_found: "{prefix} <red>NPC <white>#{id}</white> no existe.</red>"
    remove_usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars npc remove <id></yellow>"
    list_header: "{prefix} <gold>NPCs configurados:</gold>"
    list_line: "{prefix} <gray>- <white>#{id}</white> | tipo: <white>{type}</white></gray>"
    list_empty: "{prefix} <yellow>No NPCs configurado yet.</yellow>"
  team_spawn:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> bed_wars team spawn <team_id></yellow>"
    set: "{prefix} <green>Aparición de equipo establecida para el equipo <white>{team}</white> en tu ubicación actual.</green>"
