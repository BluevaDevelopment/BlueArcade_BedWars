setup_messages:
  common:
    boolean_true: "Yes"
    boolean_false: "No"
  team:
    usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars team <count|size> <value></yellow>"
    success: "{prefix} <green>Team {setting} set to {value} for {game} in arena {arena_id}.</green>"
    invalid_limit: "{prefix} <red>Team configuration exceeds arena max players ({max_players}).</red>"
    invalid_value: "{prefix} <red>Team {setting} must be greater than 0.</red>"
    invalid_count: "{prefix} <red>Team count must be at least 2.</red>"
    invalid_size: "{prefix} <red>Team size must be at least 1.</red>"
    numeric_ids_only: "{prefix} <red>team_id must be numeric and within configured range: <white>{min}</white> to <white>{max}</white>.</red>"
  region:
    usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars region <set|clear></yellow>"
    must_use_stick: "{prefix} <red>Select two corners with the setup tool first.</red>"
    set: "{prefix} <green>Regeneration region saved.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
    cleared: "{prefix} <yellow>Regeneration region cleared.</yellow>"
  bed:
    usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars bed set <team_id></yellow>"
    set_usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars bed set <team_id></yellow>"
    must_look_at_block: "{prefix} <red>Look at the bed block you want to set as the team bed.</red>"
    set: "{prefix} <green>Bed set for team <white>{team}</white> at the targeted block.</green>"
  spawner:
    usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars spawner <add|list|remove></yellow>"
    add_usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars spawner add <iron|gold|diamond|emerald> <true|false></yellow>"
    must_look_at_block: "{prefix} <red>Look at the block where the spawner should be placed.</red>"
    invalid_type: "{prefix} <red>Invalid spawner type: <white>{type}</white>. Use: iron, gold, diamond, emerald.</red>"
    invalid_hologram: "{prefix} <red>Invalid hologram value: <white>{value}</white>. Must be <white>true</white> or <white>false</white>.</red>"
    added: "{prefix} <green>Spawner <white>#{id}</white> added. Type: <white>{type}</white>, hologram: <white>{hologram}</white>. Interval is configured in settings.yml.</green>"
    removed: "{prefix} <yellow>Spawner <white>#{id}</white> removed.</yellow>"
    not_found: "{prefix} <red>No spawner found at the targeted block.</red>"
    list_header: "{prefix} <gold>Configured spawners:</gold>"
    list_line: "{prefix} <gray>- <white>#{id}</white> | type: <white>{type}</white> | hologram: <white>{hologram}</white></gray>"
    list_empty: "{prefix} <yellow>No spawners configured yet.</yellow>"
  npc:
    usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars npc <add|list|remove></yellow>"
    add_usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars npc add <store|upgrade></yellow>"
    invalid_type: "{prefix} <red>Invalid NPC type: <white>{type}</white>. Use: store, upgrade.</red>"
    added: "{prefix} <green>NPC <white>#{id}</white> added. Type: <white>{type}</white>.</green>"
    removed: "{prefix} <yellow>NPC <white>#{id}</white> removed.</yellow>"
    not_found: "{prefix} <red>NPC <white>#{id}</white> does not exist.</red>"
    remove_usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars npc remove <id></yellow>"
    list_header: "{prefix} <gold>Configured NPCs:</gold>"
    list_line: "{prefix} <gray>- <white>#{id}</white> | type: <white>{type}</white></gray>"
    list_empty: "{prefix} <yellow>No NPCs configured yet.</yellow>"
  team_spawn:
    usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> bed_wars team spawn <team_id></yellow>"
    set: "{prefix} <green>Team spawn set for team <white>{team}</white> at your current location.</green>"
