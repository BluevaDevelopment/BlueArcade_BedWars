    in_game: "<yellow>{team}</yellow> <dark_gray>•</dark_gray> <white>Bed:</white> {bed_status} <dark_gray>•</dark_gray> <white>K:</white> <red>{kills}</red> <white>D:</white> <gray>{deaths}</gray>"
  team_status:
    bed_intact: "<green>✔</green>"
    eliminated: "<red>✘</red>"
    alive_count: "<yellow>{count}</yellow>"
    own_team_suffix: " <green><bold>YOU</bold></green>"
    bed_line: "<white>{team}</white> <gray>-</gray> {status}{own_team_suffix}"
    own_team_header_suffix: " <green><bold><- You</bold></green>"
    header: "<white>{team}{own_team_suffix}</white>"
    summary: "<white>{team}</white> <gray>Bed {bed_status} • K {kills} • D {deaths}</gray>"
  generator_upgrade: "<gold><bold>⚡ GENERATOR UPGRADE</bold></gold> <gray>-</gray> <yellow>{label}</yellow> <gray>spawners are now</gray> <green>{multiplier}x</green> <gray>faster!</gray>"
  shop:
    not_configured: "<red>Shop is not configured.</red>"
    insufficient_money: "<red>You don't have enough {currency}! Need {price} more.</red>"
    purchased: "<green>You purchased {item}!</green>"
    already_bought: "<red>You already own this permanent item!</red>"
    weight_blocked: "<red>You already have better armor!</red>"
    quick_buy_added: "<green>Added to Quick Buy!</green>"
    quick_buy_removed: "<red>Removed from Quick Buy.</red>"
    quick_buy_full: "<red>Quick Buy is full!</red>"
    quick_buy_already_added: "<yellow>That item is already in your Quick Buy!</yellow>"
    currencies:
      money: "Money"
      iron: "Iron"
      gold: "Gold"
      diamond: "Diamond"
      emerald: "Emerald"
  upgrade:
    not_configured: "<red>Upgrades are not configured.</red>"
    teams_disabled: "<red>Teams are not enabled.</red>"
    no_team: "<red>You are not in a team.</red>"
    maxed: "<red>This upgrade is already maxed out.</red>"
    purchased: "<green>{player} purchased {upgrade} Tier {tier} for the team!</green>"
  special_items:
    magic_milk_used: "<yellow>You are now immune to traps for {seconds} seconds!</yellow>"
  deaths:
    killed_by_player:
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>was eliminated by</gray> <yellow>{killer}</yellow><gray>.</gray>"
      - "<dark_red>✘</dark_red> <yellow>{killer}</yellow> <gray>outplayed</gray> <red>{victim}</red><gray>.</gray>"
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>fell to</gray> <yellow>{killer}</yellow><gray>'s attack.</gray>"
      - "<dark_red>✘</dark_red> <yellow>{killer}</yellow> <gray>took down</gray> <red>{victim}</red><gray>.</gray>"
    generic:
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>couldn't survive the chaos.</gray>"
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>was eliminated.</gray>"
    final_kill:
      - "<dark_red>☠</dark_red> <red>{victim}</red> <gray>was</gray> <dark_red>FINAL KILLED</dark_red> <gray>by</gray> <yellow>{killer}</yellow><gray>.</gray>"
      - "<dark_red>☠</dark_red> <yellow>{killer}</yellow> <dark_red>FINAL KILLED</dark_red> <red>{victim}</red><gray>.</gray>"
    final_kill_generic:
      - "<dark_red>☠</dark_red> <red>{victim}</red> <gray>was</gray> <dark_red>FINAL KILLED</dark_red><gray>.</gray>"

