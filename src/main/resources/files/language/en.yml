display_name: "Bed Wars"

description:
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
  - "<green>Game</green> <gray>-</gray> <yellow><bold>Bed Wars</bold></yellow>"
  - " "
  - "<white>Description:</white>"
  - "<gray>Protect your bed, destroy enemy beds, and eliminate</gray>"
  - "<gray>all opposing players to be the last team standing!</gray>"
  - " "
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"

vote_menu:
  name: "<green>Bed Wars</green>"
  lore:
    - "<gray>Protect your bed, break enemy beds,</gray>"
    - "<gray>and be the last team standing!</gray>"
    - ""
    - "<white>{votes}</white> <gray>votes.</gray>"

votes:
  labels:
    categories:
      hearts: "Hearts"
      time: "Time"
      weather: "Weather"
    options:
      hearts:
        "10": "10 hearts"
        "20": "20 hearts"
        "30": "30 hearts"
      time:
        day: "Day"
        night: "Night"
        sunset: "Sunset"
        sunrise: "Sunrise"
      weather:
        sunny: "Sunny"
        rainy: "Rainy"
  messages:
    broadcast: "<yellow>{player}</yellow> <gray>picked</gray> <aqua>{category}</aqua> <dark_gray>→</dark_gray> <white>{option}</white> <yellow>({votes} votes)</yellow>"
    selected:
      sources:
        popular: "by popular vote"
        default: "by default"
      hearts: "<gray>Selected</gray> <red>{option}</red> <gray>{source}.</gray>"
      time: "<gray>Selected</gray> <yellow>{option}</yellow> <gray>time {source}.</gray>"
      weather: "<gray>Selected</gray> <blue>{option}</blue> <gray>weather {source}.</gray>"
    invalid: "<red>That vote option is not available.</red>"
    not_available: "<red>You can only vote while waiting for the game to start.</red>"
    no_permission: "<red>You do not have permission to vote for</red> <yellow>{option}</yellow><red>.</red>"
stats:

  descriptions:
    wins: "BedWars victories"
    games_played: "BedWars matches played"
    kills: "Opponents eliminated in BedWars"
    deaths: "Times eliminated in BedWars"
    beds_broken: "Enemy beds destroyed in BedWars"
    final_kills: "Opponents eliminated without bed in BedWars"
  labels:
    kills: "Eliminations"
    games_played: "Bed Wars games played"
    wins: "Bed Wars wins"
    deaths: "Deaths"
    beds_broken: "Beds destroyed"
    final_kills: "Final kills"

